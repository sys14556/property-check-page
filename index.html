<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 设置网页编码，防止中文乱码 -->
    <meta charset="UTF-8">

    <!-- 适配手机端显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 浏览器标签页标题 -->
    <title>不动产登记</title>

    <style>
        /* 页面整体样式 */
        body {
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            color: #333333;
        }

        /* 页面主体 */
        .container {
            max-width: 900px;
            margin: 30px auto;
            background: #ffffff;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            border-radius: 8px;
        }

        /* 页面标题 */
        h2 {
            text-align: center;
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 700;
        }

        /* 查询信息区域 */
        .verify-box {
            padding: 18px 24px;
            margin-bottom: 24px;
            background: #ffffff;
        }

        /* 每一行信息 */
        .row {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #dddddd;
            padding: 12px 0;
            font-size: 18px;
        }

            /* 最后一行去掉下划线 */
            .row:last-child {
                border-bottom: none;
            }

        /* 左侧字段 */
        .label {
            width: 130px;
            color: #888888;
            flex-shrink: 0;
        }

        /* 右侧内容 */
        .value {
            flex: 1;
            font-weight: 600;
            color: #2c3e50;
            word-break: break-all;
        }

        /* 图片整体区域 */
        .image-area {
            margin-top: 0;
            padding: 0;
            background: #ffffff;
        }

            /* 两张图片连续显示，不留缝隙 */
            .image-area img {
                width: 100%;
                height: auto;
                display: block;
                margin: 0;
                padding: 0;
                border: none;
            }

        /* 底部说明 */
        .tips {
            font-size: 14px;
            color: #666666;
            line-height: 1.8;
            margin-top: 20px;
            background: #fafafa;
            padding: 12px;
        }

        /* 手机端适配 */
        @media screen and (max-width: 600px) {
            .container {
                margin: 0;
                padding: 14px;
                border-radius: 0;
                box-shadow: none;
            }

            h2 {
                font-size: 20px;
                margin-bottom: 18px;
            }

            .verify-box {
                padding: 8px 0;
                margin-bottom: 16px;
            }

            .row {
                font-size: 16px;
                padding: 10px 0;
            }

            .label {
                width: 100px;
            }

            .tips {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h2>不动产登记资料查询结果</h2>

        <!-- 上方查询信息 -->
        <div class="verify-box">

            <div class="row">
                <div class="label">查询编号：</div>
                <div class="value">4322000</div>
            </div>

            <div class="row">
                <div class="label">查询类型：</div>
                <div class="value">登记资料查询</div>
            </div>

            <div class="row">
                <div class="label">查询用途：</div>
                <div class="value">入学</div>
            </div>

            <div class="row">
                <div class="label">查询时间：</div>
                <div class="value" id="beijing-time"></div>
            </div>

            <div class="row">
                <div class="label">查询人：</div>
                <div class="value">张航</div>
            </div>

            <div class="row">
                <div class="label">核验结果：</div>
                <div class="value">核验过</div>
            </div>

        </div>

        <!-- 下方两张 JPG 图片，连续衔接显示 -->
        <div class="image-area">
            <!-- 第一张图片，文件名必须是 proof1.jpg -->
            <img src="proof1.jpg" alt="材料图片一">

            <!-- 第二张图片，文件名必须是 proof2.jpg -->
            <img src="proof2.jpg" alt="材料图片二">
        </div>
               
    </div>

    <script>
        /*
          自动生成北京时间
          时间固定为每次打开网页时的时间
          格式：YYYY-MM-DD HH:MM:SS
        */

        function getBeijingTime() {
            const now = new Date();

            const formatter = new Intl.DateTimeFormat("zh-CN", {
                timeZone: "Asia/Shanghai",
                year: "numeric",
                month: "2-digit",
                day: "2-digit",
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: false
            });

            const parts = formatter.formatToParts(now);

            const timeObj = {};
            parts.forEach(part => {
                timeObj[part.type] = part.value;
            });

            const beijingTime =
                timeObj.year + "-" +
                timeObj.month + "-" +
                timeObj.day + " " +
                timeObj.hour + ":" +
                timeObj.minute + ":" +
                timeObj.second;

            document.getElementById("beijing-time").textContent = beijingTime;
        }

        // 页面每次打开时，只执行一次
        getBeijingTime();
    </script>

</body>
</html>
